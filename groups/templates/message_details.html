{% extends 'base.html' %}

{% block content %}
  {% include 'header.html' with title=message.sender nav_menu=True group_id=group.group_id %}
  <div class="container" style="min-height: calc(100vh - 11.075rem);">
    <div class="message-detail">
      <p>{{ message.message }}</p>
      <small>Sent {{ message.message_time }}</small>
    </div>
  </div>
  <div class="reply-form form-container d-flex" method="post">
    {% csrf_token %}
    <div class="form-group" style="flex-shrink: 0;">
      <input class="form-control" name="reply" id="reply" placeholder="REPLY" />
    </div>
    <button class="btn btn-primary" type="submit">Send</button>
  </div>
  {% include 'footer.html' with show_logo=True %}
{% endblock %}
